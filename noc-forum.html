        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        gothic: ['Cinzel', 'serif'],
                    },
                    colors: {
                        navy: { 50: '#f8fafc', 100: '#f1f5f9', 800: '#1e293b', 900: '#0f172a' },
                        magic: { 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' },
                        accent: { 400: '#fbbf24', 500: '#f59e0b', 600: '#d97706' }

                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' }

                        slideIn: {
                            '0%': { transform: 'translateX(-20px)', opacity: '0' },
                            '100%': { transform: 'translateX(0)', opacity: '1' }
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' }
                        }
                    }
                }
            }
        }

    <style>
        /* === BASE STYLES === */
        * { box-sizing: border-box; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
            line-height: 1.6;
        }
        
        /* === CUSTOM SCROLLBAR === */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #2563eb; }
        
        /* === FORM ELEMENTS === */
        .form-input, .form-select, .form-textarea {
            background: transparent;
            border: none;
            border-bottom: 2px solid #475569;
            color: #f1f5f9;
            padding: 0.75rem 0;
            width: 100%;
            transition: all 0.3s ease;
            font-size: 1rem;
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-bottom-color: #3b82f6;
            box-shadow: 0 1px 0 0 #3b82f6;
        }
        .form-input::placeholder, .form-textarea::placeholder { color: #64748b; }
        
        /* === BUTTONS === */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border-radius: 1rem;
            font-weight: 600;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.4);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.6);
        }
        .btn-primary:active { transform: translateY(0); }
        .btn-primary:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #3b82f6;
            color: #3b82f6;
        }
        .btn-outline:hover {
            background: rgba(59, 130, 246, 0.1);
        }
        .btn-ghost {
            background: transparent;
            color: #94a3b8;
            padding: 0.5rem;
        }
        .btn-ghost:hover {
            color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
        }
        .btn-icon {
            width: 2.5rem;
            height: 2.5rem;
            padding: 0;
            border-radius: 50%;
        }
        
        /* === CARDS === */
        .card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 1.5rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            animation: float 6s ease-in-out infinite;
        }
        .card:hover {
            border-color: rgba(59, 130, 246, 0.4);
            box-shadow: 0 12px 40px rgba(37, 99, 235, 0.2);
            transform: translateY(-4px);
        }
        .card-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid rgba(59, 130, 246, 0.2);
        }
        .card-body { padding: 1.5rem; }
        .card-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid rgba(59, 130, 246, 0.2);
        }
        
        /* === CATEGORY CARDS === */
        .category-card {
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        .category-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.1), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 0;
        }
        .category-card:hover::before { opacity: 1; }
        .category-card .icon {
            font-size: 2rem;
            color: #3b82f6;
            margin-bottom: 1rem;
            transition: transform 0.3s ease;
        }
        .category-card:hover .icon { transform: scale(1.1); }
        
        /* === POST ITEMS === */
        .post-item {
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .post-item:hover {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.05);
        }
        .post-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 0.875rem;
            color: #94a3b8;
        }
        .post-stats {
            display: flex;
            gap: 1.5rem;
            font-size: 0.875rem;
            color: #64748b;
        }
        .post-stats span {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }
        
        /* === COMMENTS === */
        .comment {
            border-left: 3px solid #3b82f6;
            padding-left: 1rem;
            margin-left: 0.5rem;
        }
        .comment.nested {
            margin-left: 2.5rem;
            border-left-color: #60a5fa;
        }
        .comment-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }
        .comment-avatar {
            width: 2rem;
            height: 2rem;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.75rem;
            color: white;
        }
        
        /* === PROFILE === */
        .profile-header {
            position: relative;
            padding: 2rem;
            text-align: center;
        }
        .profile-cover {
            height: 120px;
            background: linear-gradient(135deg, #1e293b, #3b82f6);
            border-radius: 1.5rem 1.5rem 0 0;
            position: relative;
            overflow: hidden;
        }
        .profile-cover::after {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%233b82f6' fill-opacity='0.1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid #1e293b;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            margin: -50px auto 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 700;
            color: white;
            position: relative;
            z-index: 1;
        }
        .profile-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            padding: 1rem;
            text-align: center;
        }
        .profile-stat {
            padding: 0.75rem;
            border-radius: 1rem;
            background: rgba(59, 130, 246, 0.1);
        }
        .profile-stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #3b82f6;
        }
        .profile-stat-label {
            font-size: 0.75rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        /* === BADGES & TAGS === */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge-primary { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .badge-success { background: rgba(34, 197, 94, 0.2); color: #4ade80; }
        .badge-warning { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .badge-accent { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        
        .tag {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: rgba(59, 130, 246, 0.15);
            border-radius: 0.5rem;
            font-size: 0.75rem;
            color: #93c5fd;
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
            transition: all 0.2s ease;
        }
        .tag:hover {
            background: rgba(59, 130, 246, 0.3);
            color: #dbeafe;
        }
        
        /* === NAVIGATION === */
        .nav-link {
            position: relative;
            padding: 0.5rem 1rem;
            color: #94a3b8;
            transition: color 0.2s ease;
        }
        .nav-link:hover, .nav-link.active {
            color: #3b82f6;
        }
        .nav-link.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            height: 2px;
            background: #3b82f6;
            border-radius: 9999px;
        }
        
        /* === TOAST NOTIFICATIONS === */
        #toast-container {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            max-width: 350px;
        }
        .toast {
            padding: 1rem 1.25rem;
            border-radius: 1rem;
            background: rgba(30, 41, 59, 0.95);
            border: 1px solid rgba(59, 130, 246, 0.3);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            animation: slide-in 0.3s ease-out;
        }
        .toast.success { border-left: 4px solid #22c55e; }
        .toast.error { border-left: 4px solid #ef4444; }
        .toast.info { border-left: 4px solid #3b82f6; }
        .toast.warning { border-left: 4px solid #f59e0b; }
        
        /* === UTILITIES === */
        .hidden { display: none !important; }
        .animate-fade-in { animation: fade-in 0.4s ease-out; }
        .text-gradient {
            background: linear-gradient(135deg, #60a5fa, #3b82f6, #2563eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .divider {
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(59, 130, 246, 0.3), transparent);
            margin: 1.5rem 0;
        }
        
        /* === LOADING STATES === */
        .skeleton {
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 0.5rem;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        /* === RESPONSIVE === */
        @media (max-width: 768px) {
            .profile-stats { grid-template-columns: 1fr; }
            .post-stats { flex-wrap: wrap; gap: 0.75rem; }
            .nav-desktop { display: none; }
        }
    </style>
</head>

    <script>
        // ========================================
        // 🔧 FIREBASE CONFIGURATION

            apiKey: "YOUR_API_KEY",

            projectId: "YOUR_PROJECT_ID",

        };
        
        // Initialize Firebase

            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        const auth = firebase.auth();
        const storage = firebase.storage();
        
        // Enable offline persistence

            if (err.code === 'failed-precondition') {
                console.log('Multiple tabs open, persistence can only be enabled in one tab at a time.');

                console.log('Browser doesn\'t support persistence');
            }
        });

            currentView: 'home',

            currentPostId: null,
            currentProfileId: null,
            searchQuery: '',
            isLoading: false,
            notifications: [],
            unreadCount: 0
        };

        const CATEGORIES = [

            { id: 'coinmagic', name: 'Coin Magic', icon: 'fa-coins', color: 'from-amber-500 to-orange-600' },

                        <div class="flex-1 min-w-0">
                            <p class="text-sm">
                                <span class="font-medium text-magic-400">${activity.username}</span>
                                ${activity.action}
                                ${activity.postTitle ? `<span class="text-gray-300 hover:text-magic-400 cursor-pointer" data-postid="${activity.postid}" data-action="view-post">"${activity.postTitle}"</span>` : ''}
                            </p>
                            <p class="text-xs text-gray-500 mt-1">${new Date(activity.timestamp).toLocaleString('id-ID', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' })}</p>
                        </div>
                    </div>
                `;
            },
            
            // Helper: Category Description
            getCategoryDescription: (categoryId) => {
                const descriptions = {
                    cardmagic: 'Teknik, tutorial, dan diskusi tentang sulap kartu',
                    coinmagic: 'Sulap koin: sleight of hand, production, vanishing',
                    mentalism: 'Mind reading, prediction, psychological magic',
                    everydayobject: 'Sulap dengan benda sehari-hari: pulpen, kertas, dll',
                    idea: 'Konsep, teori, dan ide kreatif untuk pertunjukan',
                    market: 'Review produk, rekomendasi, dan diskusi peralatan sulap'
                };
                return descriptions[categoryId] || 'Diskusi umum';
            },
            
            // Helper: Category Stats (mock data)
            getCategoryStats: (categoryId, type) => {
                const stats = {
                    cardmagic: { posts: 234, members: 89 },
                    coinmagic: { posts: 156, members: 67 },
                    mentalism: { posts: 189, members: 102 },
                    everydayobject: { posts: 98, members: 45 },
                    idea: { posts: 145, members: 78 },
                    market: { posts: 67, members: 34 }
                };
                return stats[categoryId]?.[type] || 0;
            }
        };

        // ========================================
        // 🔄 DATA SERVICE (Firebase Operations)
        // ========================================
        const DataService = {
            // Subscribe to real-time data
            subscribe: (callback) => {
                const unsubscribers = [];
                
                // Posts collection
                unsubscribers.push(
                    db.collection('posts').orderBy('timestamp', 'desc').limit(50)
                      .onSnapshot(snapshot => {
                          AppState.posts = snapshot.docs.map(doc => ({ postid: doc.id, ...doc.data() }));
                          callback();
                      })
                );
                
                // Users collection
                unsubscribers.push(
                    db.collection('users').onSnapshot(snapshot => {
                        AppState.users = snapshot.docs.map(doc => ({ userid: doc.id, ...doc.data() }));
                        callback();
                    })
                );
                
                // Comments collection
                unsubscribers.push(
                    db.collection('comments').orderBy('timestamp', 'asc')
                      .onSnapshot(snapshot => {
                          AppState.comments = snapshot.docs.map(doc => ({ commentid: doc.id, ...doc.data() }));
                          callback();
                      })
                );
                
                // Likes collection
                unsubscribers.push(
                    db.collection('likes').onSnapshot(snapshot => {
                        AppState.likes = snapshot.docs.map(doc => ({ likeid: doc.id, ...doc.data() }));
                        callback();
                    })
                );
                
                // Return cleanup function
                return () => unsubscribers.forEach(unsub => unsub());
            },
            
            // Create new post
            createPost: async (postData) => {
                const postRef = await db.collection('posts').add({
                    ...postData,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    views: 0,
                    isPinned: false,
                    isSolved: false
                });
                return postRef.id;
            },
            
            // Create comment
            createComment: async (commentData) => {
                const commentRef = await db.collection('comments').add({
                    ...commentData,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                return commentRef.id;
            },
            
            // Toggle like
            toggleLike: async (postId, userId) => {
                const existing = await db.collection('likes')
                    .where('postid', '==', postId)
                    .where('userid', '==', userId)
                    .limit(1)
                    .get();
                
                if (!existing.empty) {
                    // Unlike
                    await existing.docs[0].ref.delete();
                    return false;
                } else {
                    // Like
                    await db.collection('likes').add({
                        postid: postId,
                        userid: userId,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    return true;
                }
            },
            
            // Update user profile
            updateProfile: async (userId, profileData) => {
                await db.collection('users').doc(userId).update({
                    ...profileData,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            },
            
            // Track post view
            trackView: async (postId, userId) => {
                // Check if already viewed
                const viewed = await db.collection('views')
                    .where('postid', '==', postId)
                    .where('userid', '==', userId)
                    .limit(1)
                    .get();
                
                if (viewed.empty) {
                    await db.collection('views').add({
                        postid: postId,
                        userid: userId,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    // Increment view count
                    await db.collection('posts').doc(postId).update({
                        views: firebase.firestore.FieldValue.increment(1)
                    });
                }
            }
        };

        // ========================================
        // 🎮 APP ACTIONS & CONTROLLERS
        // ========================================
        const Actions = {
            // Navigation
            navigateTo: (view, params = {}) => {
                AppState.currentView = view;
                Object.assign(AppState, params);
                
                // Update breadcrumb
                const breadcrumb = document.getElementById('breadcrumb');
                const breadcrumbCurrent = document.getElementById('breadcrumb-current');
                
                if (view === 'home') {
                    breadcrumb.classList.add('hidden');
                } else {
                    breadcrumb.classList.remove('hidden');
                    breadcrumbCurrent.textContent = params.title || view;
                }
                
                // Render view
                Actions.renderCurrentView();
                
                // Scroll to top
                window.scrollTo({ top: 0, behavior: 'smooth' });
            },
            
            // Render current view based on state
            renderCurrentView: () => {
                const main = document.getElementById('main-content');
                
                switch(AppState.currentView) {
                    case 'home':
                        main.innerHTML = UI.renderHome();
                        break;
                    case 'categories':
                        main.innerHTML = UI.renderCategories();
                        break;
                    case 'category':
                        const category = CATEGORIES.find(c => c.id === AppState.currentCategory);
                        const categoryPosts = (AppState.posts || []).filter(p => p.category === AppState.currentCategory);
                        main.innerHTML = `
                            <button class="mb-4 text-magic-400 hover:underline flex items-center gap-2" data-action="back">
                                <i class="fas fa-arrow-left"></i> Kembali
                            </button>
                            <h2 class="font-gothic text-2xl font-bold mb-6 flex items-center gap-3">
                                <i class="fas ${category?.icon}"></i> ${category?.name}
                            </h2>
                            <div class="flex justify-between items-center mb-6">
                                <p class="text-gray-400">${categoryPosts.length} thread ditemukan</p>
                                <button class="btn btn-primary" data-action="new-post" data-category="${AppState.currentCategory}">
                                    <i class="fas fa-plus"></i> Thread Baru
                                </button>
                            </div>
                            <div class="space-y-4">
                                ${categoryPosts.length > 0 
                                    ? categoryPosts.map(post => UI.renderPostCard(post)).join('')
                                    : '<div class="card p-8 text-center text-gray-400">Belum ada thread di kategori ini. Jadilah yang pertama!</div>'
                                }
                            </div>
                        `;
                        break;
                    case 'post':
                        const post = AppState.posts?.find(p => p.postid === AppState.currentPostId);
                        main.innerHTML = `
                            <button class="mb-4 text-magic-400 hover:underline flex items-center gap-2" data-action="back">
                                <i class="fas fa-arrow-left"></i> Kembali ke ${AppState.currentCategory ? 'Kategori' : 'Daftar Thread'}
                            </button>
                            ${UI.renderPostDetail(post)}
                        `;
                        // Track view
                        if (AppState.currentUser) {
                            DataService.trackView(AppState.currentPostId, AppState.currentUser.userid);
                        }
                        break;
                    case 'profile':
                        const profileUser = AppState.currentProfileId === AppState.currentUser?.userid 
                            ? AppState.currentUser 
                            : AppState.users?.find(u => u.userid === AppState.currentProfileId);
                        main.innerHTML = `
                            <button class="mb-4 text-magic-400 hover:underline flex items-center gap-2" data-action="back">
                                <i class="fas fa-arrow-left"></i> Kembali
                            </button>
                            ${UI.renderProfile(profileUser, AppState.currentProfileId === AppState.currentUser?.userid)}
                        `;
                        break;
                    case 'new-post':
                        main.innerHTML = UI.renderNewPostForm();
                        break;
                    default:
                        main.innerHTML = UI.renderHome();
                }
                
                // Attach event listeners after render
                Actions.attachEventListeners();
            },
            
            // Render New Post Form
            renderNewPostForm: () => {
                return `
                    <button class="mb-4 text-magic-400 hover:underline flex items-center gap-2" data-action="back">
                        <i class="fas fa-arrow-left"></i> Batal
                    </button>
                    
                    <div class="card p-6 max-w-3xl mx-auto">
                        <h2 class="font-gothic text-2xl font-bold mb-6">✨ Buat Thread Baru</h2>
                        
                        <form id="new-post-form">
                            <div class="mb-6">
                                <label class="block text-sm font-medium mb-2">Kategori</label>
                                <select id="post-category" class="form-select rounded-lg" required>
                                    ${CATEGORIES.map(cat => `
                                        <option value="${cat.id}" ${cat.id === AppState.currentCategory ? 'selected' : ''}>
                                            ${cat.name}
                                        </option>
                                    `).join('')}
                                </select>
                            </div>
                            
                            <div class="mb-6">
                                <label class="block text-sm font-medium mb-2">Judul Thread</label>
                                <input type="text" id="post-title" class="form-input rounded-lg" placeholder="Contoh: Teknik Advanced Palm untuk Coin Magic" required maxlength="150">
                                <p class="text-xs text-gray-500 mt-1">Maksimal 150 karakter</p>
                            </div>
                            
                            <div class="mb-6">
                                <label class="block text-sm font-medium mb-2">Isi Thread</label>
                                <textarea id="post-content" class="form-textarea rounded-lg min-h-[200px]" placeholder="Jelaskan pertanyaan, trik, atau ide Anda secara detail..." required></textarea>
                                <p class="text-xs text-gray-500 mt-1">Gunakan paragraf untuk keterbacaan yang lebih baik</p>
                            </div>
                            
                            <div class="mb-6">
                                <label class="block text-sm font-medium mb-2">Tags (opsional)</label>
                                <input type="text" id="post-tags" class="form-input rounded-lg" placeholder="tutorial, beginner, card-control (pisahkan dengan koma)">
                                <p class="text-xs text-gray-500 mt-1">Bantu orang lain menemukan thread Anda</p>
                            </div>
                            
                            <div class="flex items-center gap-3 mb-6">
                                <input type="checkbox" id="post-notify" class="rounded border-gray-600 text-magic-600 focus:ring-magic-500">
                                <label for="post-notify" class="text-sm">Kirim notifikasi saat ada yang membalas</label>
                            </div>
                            
                            <div class="flex justify-end gap-3">
                                <button type="button" class="btn btn-outline" data-action="back">Batal</button>
                                <button type="submit" class="btn btn-primary" id="submit-post-btn">
                                    <i class="fas fa-paper-plane"></i> Publikasikan Thread
                                </button>
                            </div>
                        </form>
                    </div>
                `;
            },
            
            // Attach event listeners to dynamic content
            attachEventListeners: () => {
                // Back button
                document.querySelectorAll('[data-action="back"]').forEach(btn => {
                    btn.onclick = (e) => {
                        e.preventDefault();
                        if (AppState.currentView === 'post' && AppState.currentCategory) {
                            Actions.navigateTo('category', { currentCategory: AppState.currentCategory });
                        } else {
                            Actions.navigateTo('home');
                        }
                    };
                });
                
                // Navigation links
                document.querySelectorAll('[data-view]').forEach(link => {
                    link.onclick = (e) => {
                        e.preventDefault();
                        const view = link.dataset.view;
                        Actions.navigateTo(view);
                    };
                });
                
                // Category cards
                document.querySelectorAll('[data-action="view-category"]').forEach(card => {
                    card.onclick = (e) => {
                        e.preventDefault();
                        const categoryId = card.dataset.category;
                        Actions.navigateTo('category', { currentCategory: categoryId, title: CATEGORIES.find(c => c.id === categoryId)?.name });
                    };
                });
                
                // Post items
                document.querySelectorAll('[data-action="view-post"]').forEach(item => {
                    item.onclick = (e) => {
                        e.preventDefault();
                        const postId = item.dataset.postid;
                        Actions.navigateTo('post', { currentPostId: postId });
                    };
                });
                
                // Profile links
                document.querySelectorAll('[data-action="view-profile"]').forEach(link => {
                    link.onclick = (e) => {
                        e.preventDefault();
                        const userId = link.dataset.userid;
                        Actions.navigateTo('profile', { currentProfileId: userId });
                    };
                });
                
                // Like buttons
                document.querySelectorAll('[data-action="toggle-like"]').forEach(btn => {
                    btn.onclick = async (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        if (!AppState.currentUser) {
                            UI.toast('Login untuk menyukai thread', 'info');
                            return;
                        }
                        const postId = btn.dataset.postid;
                        const wasLiked = await DataService.toggleLike(postId, AppState.currentUser.userid);
                        UI.toast(wasLiked ? '✅ Thread disukai!' : '❌ Like dibatalkan', wasLiked ? 'success' : 'info');
                        Actions.renderCurrentView();
                    };
                });
                
                // Comment form
                const commentForm = document.getElementById('comment-form');
                if (commentForm) {
                    commentForm.onsubmit = async (e) => {
                        e.preventDefault();
                        const content = document.getElementById('comment-content').value.trim();
                        if (!content) return;
                        
                        try {
                            await DataService.createComment({
                                postid: AppState.currentPostId,
                                userid: AppState.currentUser.userid,
                                username: AppState.currentUser.username,
                                content,
                                parent_comment_id: 'root'
                            });
                            UI.toast('💬 Komentar terkirim!', 'success');
                            Actions.renderCurrentView();
                        } catch (err) {
                            UI.toast('Gagal mengirim komentar', 'error');
                            console.error(err);
                        }
                    };
                }
                
                // Reply buttons
                document.querySelectorAll('.reply-btn').forEach(btn => {
                    btn.onclick = (e) => {
                        e.preventDefault();
                        const commentId = btn.dataset.commentid;
                        const form = document.querySelector(`.reply-form[data-parentid="${commentId}"]`);
                        if (form) {
                            form.classList.toggle('hidden');
                            form.querySelector('textarea')?.focus();
                        }
                    };
                });
                
                // Cancel reply
                document.querySelectorAll('.cancel-reply').forEach(btn => {
                    btn.onclick = (e) => {
                        e.preventDefault();
                        btn.closest('.reply-form').classList.add('hidden');
                    };
                });
                
                // Reply form submit
                document.querySelectorAll('.reply-form').forEach(form => {
                    form.onsubmit = async (e) => {
                        e.preventDefault();
                        const content = form.querySelector('textarea').value.trim();
                        const parentId = form.dataset.parentid;
                        if (!content) return;
                        
                        try {
                            await DataService.createComment({
                                postid: AppState.currentPostId,
                                userid: AppState.currentUser.userid,
                                username: AppState.currentUser.username,
                                content,
                                parent_comment_id: parentId
                            });

                            Actions.renderCurrentView();
                        } catch (err) {
                            UI.toast('Gagal mengirim balasan', 'error');
                        }

                // New post form
                const newPostForm = document.getElementById('new-post-form');

                                .split(',').map(t => t.trim()).filter(t => t);
                            
                            await DataService.createPost({
                                userid: AppState.currentUser.userid,
                                username: AppState.currentUser.username,
                                title: document.getElementById('post-title').value,
                                content: document.getElementById('post-content').value,
                                category: document.getElementById('post-category').value,
                                tags,
                                notifyReplies: document.getElementById('post-notify').checked
                            });
                            
                            UI.toast('✨ Thread berhasil dipublikasikan!', 'success');
                            Actions.navigateTo('category', { currentCategory: document.getElementById('post-category').value });
                        } catch (err) {
                            UI.toast('Gagal membuat thread', 'error');
                            console.error(err);
                            submitBtn.disabled = false;
                            submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Publikasikan Thread';
                        }
                    };
                }
                
                // FAB new post button
                const fabBtn = document.getElementById('fab-new-post');
                if (fabBtn) {
                    fabBtn.onclick = (e) => {
                        e.preventDefault();
                        if (!AppState.currentUser) {
                            UI.toast('Login untuk membuat thread', 'info');
                            return;
                        }
                        Actions.navigateTo('new-post');
                    };
                }
            }
        };

        // ========================================
        // 🔐 AUTHENTICATION HANDLERS
        // ========================================
        const Auth = {
            // Check auth state
            init: () => {
                auth.onAuthStateChanged(async (user) => {
                    if (user) {
                        // Get user data from Firestore
                        const userDoc = await db.collection('users').doc(user.uid).get();
                        if (userDoc.exists) {
                            AppState.currentUser = { userid: user.uid, ...userDoc.data() };
                            UI.updateAuthUI(true);
                            Actions.navigateTo('home');
                        }
                    } else {
                        AppState.currentUser = null;
                        UI.updateAuthUI(false);
                        Actions.navigateTo('home');
                    }
                });
            },
            
            // Login with email/password
            login: async (email, password) => {
                try {
                    await auth.signInWithEmailAndPassword(email, password);
                    UI.toast('✅ Login berhasil!', 'success');
                } catch (error) {
                    UI.toast('Login gagal: ' + error.message, 'error');
                    throw error;
                }
            },
            
            // Register new user
            signup: async (userData) => {
                try {
                    const cred = await auth.createUserWithEmailAndPassword(userData.email, userData.password);
                    
                    // Save additional user data to Firestore
                    await db.collection('users').doc(cred.user.uid).set({
                        username: userData.username,
                        email: userData.email,
                        lama_sulap: userData.lama_sulap,
                        aliran_sulap: userData.aliran_sulap,
                        bio: '',
                        location: '',
                        reputation: 0,
                        joinedAt: firebase.firestore.FieldValue.serverTimestamp(),
                        isOnline: true,
                        lastSeen: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    UI.toast('✅ Registrasi berhasil! Silakan login.', 'success');
                    return true;
                } catch (error) {
                    UI.toast('Registrasi gagal: ' + error.message, 'error');
                    throw error;
                }
            },
            
            // Logout
            logout: async () => {
                try {
                    await auth.signOut();
                    UI.toast('👋 Sampai jumpa!', 'info');
                } catch (error) {
                    UI.toast('Logout gagal', 'error');
                }
            }
        };

        // ========================================
        // 🎨 UI HELPERS
        // ========================================
        UI.updateAuthUI = (isLoggedIn) => {
            const authButtons = document.getElementById('auth-buttons');
            const userMenu = document.getElementById('user-menu');
            const userName = document.getElementById('user-name');
            const userAvatar = document.getElementById('user-avatar');
            
            if (isLoggedIn && AppState.currentUser) {
                authButtons.classList.add('hidden');
                userMenu.classList.remove('hidden');
                userName.textContent = AppState.currentUser.username;
                userAvatar.textContent = (AppState.currentUser.username || 'U').charAt(0).toUpperCase();
            } else {
                authButtons.classList.remove('hidden');
                userMenu.classList.add('hidden');
            }
        };

        // ========================================
        // 🚀 APP INITIALIZATION
        // ========================================
        document.addEventListener('DOMContentLoaded', async () => {
            // Initialize auth
            Auth.init();
            
            // Setup data subscription
            DataService.subscribe(() => {
                // Re-render if needed
                if (AppState.currentView) {
                    Actions.renderCurrentView();
                }
            });
            
            // Global event listeners
            document.getElementById('search-toggle').onclick = () => {
                document.getElementById('search-bar').classList.toggle('hidden');
                if (!document.getElementById('search-bar').classList.contains('hidden')) {
                    document.getElementById('global-search').focus();
                }
            };
            
            document.getElementById('search-close').onclick = () => {
                document.getElementById('search-bar').classList.add('hidden');
                document.getElementById('global-search').value = '';
            };
            
            document.getElementById('notification-toggle').onclick = () => {
                UI.toast('🔔 Fitur notifikasi akan segera hadir!', 'info');
            };
            
            document.getElementById('user-avatar-btn').onclick = () => {
                document.getElementById('user-dropdown').classList.toggle('hidden');
            };
            
            // Close dropdown when clicking outside
            document.onclick = (e) => {
                if (!e.target.closest('#user-avatar-btn')) {
                    document.getElementById('user-dropdown').classList.add('hidden');
                }
            };
            
            // Auth buttons
            document.getElementById('login-btn').onclick = () => {
                UI.showAuthModal('login');
            };
            
            document.getElementById('signup-btn').onclick = () => {
                UI.showAuthModal('signup');
            };
            
            document.getElementById('logout-btn').onclick = async () => {
                await Auth.logout();
            };
            
            // User dropdown actions
            document.querySelectorAll('#user-dropdown [data-action]').forEach(item => {
                item.onclick = (e) => {
                    e.preventDefault();
                    const action = item.dataset.action;
                    document.getElementById('user-dropdown').classList.add('hidden');
                    
                    if (action === 'profile' && AppState.currentUser) {
                        Actions.navigateTo('profile', { currentProfileId: AppState.currentUser.userid });
                    } else if (action === 'bookmarks') {
                        UI.toast('🔖 Fitur bookmark akan segera hadir!', 'info');
                    } else if (action === 'settings') {
                        UI.toast('⚙️ Pengaturan akan segera hadir!', 'info');
                    }
                };
            });
            
            // Home view actions
            document.addEventListener('click', (e) => {
                const action = e.target.closest('[data-action]')?.dataset.action;
                if (!action) return;
                
                e.preventDefault();
                
                switch(action) {
                    case 'explore-categories':
                        Actions.navigateTo('categories');
                        break;
                    case 'view-guidelines':
                        UI.toast('📖 Panduan forum akan segera tersedia!', 'info');
                        break;
                    case 'view-all-posts':
                        Actions.navigateTo('categories');
                        break;
                    case 'new-post':
                        if (!AppState.currentUser) {
                            UI.toast('Login untuk membuat thread', 'info');
                            return;
                        }
                        Actions.navigateTo('new-post', { currentCategory: e.target.closest('[data-category]')?.dataset.category });
                        break;
                    case 'edit-profile':
                        UI.toast('✏️ Edit profil akan segera hadir!', 'info');
                        break;
                    case 'send-message':
                        UI.toast('💬 Fitur pesan akan segera hadir!', 'info');
                        break;
                }
            });
            
            // Auth Modal
            window.UI.showAuthModal = (mode = 'login') => {
                const modal = document.getElementById('modal-overlay');
                const content = document.getElementById('modal-content');
                
                content.innerHTML = `
                    <div class="p-6">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="font-gothic text-xl font-bold">${mode === 'login' ? '🔐 Login' : '✨ Buat Akun'}</h3>
                            <button id="modal-close" class="btn btn-ghost btn-icon">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                        
                        ${mode === 'login' ? `
                            <form id="auth-form">
                                <div class="mb-4">
                                    <label class="block text-sm font-medium mb-2">Email</label>
                                    <input type="email" id="auth-email" class="form-input rounded-lg" required>
                                </div>
                                <div class="mb-6">
                                    <label class="block text-sm font-medium mb-2">Password</label>
                                    <input type="password" id="auth-password" class="form-input rounded-lg" required>
                                </div>
                                <button type="submit" class="w-full btn btn-primary">Login</button>
                            </form>
                            <p class="text-center mt-4 text-sm text-gray-400">
                                Belum punya akun? 
                                <button class="text-magic-400 hover:underline" onclick="UI.showAuthModal('signup')">Daftar di sini</button>
                            </p>
                        ` : `
                            <form id="auth-form">
                                <div class="mb-4">
                                    <label class="block text-sm font-medium mb-2">Username</label>
                                    <input type="text" id="auth-username" class="form-input rounded-lg" required minlength="3">
                                </div>
                                <div class="mb-4">
                                    <label class="block text-sm font-medium mb-2">Email</label>
                                    <input type="email" id="auth-email" class="form-input rounded-lg" required>
                                </div>
                                <div class="mb-4">
                                    <label class="block text-sm font-medium mb-2">Password</label>
                                    <input type="password" id="auth-password" class="form-input rounded-lg" required minlength="6">
                                    <p class="text-xs text-gray-500 mt-1">Minimal 6 karakter</p>
                                </div>
                                <div class="mb-4">
                                    <label class="block text-sm font-medium mb-2">Berapa lama bermain sulap?</label>
                                    <select id="auth-lama-sulap" class="form-select rounded-lg" required>
                                        <option value="">Pilih...</option>
                                        <option value="Kurang dari 1 tahun">Kurang dari 1 tahun</option>
                                        <option value="1-3 tahun">1-3 tahun</option>
                                        <option value="3-5 tahun">3-5 tahun</option>
                                        <option value="Lebih dari 5 tahun">Lebih dari 5 tahun</option>
                                    </select>
                                </div>
                                <div class="mb-6">
                                    <label class="block text-sm font-medium mb-2">Aliran sulap yang diminati?</label>
                                    <select id="auth-aliran-sulap" class="form-select rounded-lg" required>
                                        <option value="">Pilih...</option>
                                        <option value="Mentalism">Mentalism</option>
                                        <option value="Sleight of Hand">Sleight of Hand</option>
                                        <option value="Illusionism">Illusionism</option>
                                        <option value="Close-up Magic">Close-up Magic</option>
                                        <option value="Stage Magic">Stage Magic</option>
                                        <option value="Comedy Magic">Comedy Magic</option>
                                    </select>
                                </div>
                                <button type="submit" class="w-full btn btn-primary">Daftar Sekarang</button>
                            </form>
                            <p class="text-center mt-4 text-sm text-gray-400">
                                Sudah punya akun? 
                                <button class="text-magic-400 hover:underline" onclick="UI.showAuthModal('login')">Login di sini</button>
                            </p>
                        `}
                    </div>
                `;
                
                modal.classList.remove('hidden');
                
                // Close modal
                document.getElementById('modal-close').onclick = () => {
                    modal.classList.add('hidden');
                };
                
                // Form submit
                document.getElementById('auth-form').onsubmit = async (e) => {
                    e.preventDefault();
                    const email = document.getElementById('auth-email').value;
                    const password = document.getElementById('auth-password').value;
                    
                    try {
                        if (mode === 'login') {
                            await Auth.login(email, password);
                        } else {
                            await Auth.signup({
                                username: document.getElementById('auth-username').value,
                                email,
                                password,
                                lama_sulap: document.getElementById('auth-lama-sulap').value,
                                aliran_sulap: document.getElementById('auth-aliran-sulap').value
                            });
                            // Switch to login after successful signup
                            setTimeout(() => UI.showAuthModal('login'), 1500);
                        }
                        modal.classList.add('hidden');
                    } catch (err) {
                        // Error already shown via toast
                    }
                };
            };
            
            // Initial render
            Actions.navigateTo('home');
            
            // Update online status periodically
            if (AppState.currentUser) {
                setInterval(async () => {
                    await db.collection('users').doc(AppState.currentUser.userid).update({
                        lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
                        isOnline: true
                    });
                }, 30000);
            }
        });
    </script>
</body>
</html>
