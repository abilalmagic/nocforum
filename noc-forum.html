<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC FORUM • Gothic Magic Community</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Cormorant Garamond', serif; 
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            color: #e8e8f0;
            min-height: 100vh;
            line-height: 1.6;
        }
        .font-gothic { font-family: 'Cinzel', serif; }
        
        /* Header */
        header { 
            background: rgba(10,10,15,0.95); 
            border-bottom: 1px solid #2a2a3a;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { display: flex; align-items: center; gap: 0.75rem; }
        .logo-icon { font-size: 1.5rem; }
        .logo-text { font-size: 1.25rem; font-weight: 700; color: #c9a961; }
        .logo-sub { font-size: 0.7rem; color: #888; font-style: italic; }
        
        /* Navigation */
        .nav-buttons { display: flex; gap: 0.5rem; align-items: center; }
        .btn-nav {
            background: transparent;
            border: none;
            color: #888;
            padding: 0.5rem 0.75rem;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .btn-nav:hover, .btn-nav.active { color: #c9a961; }
        .btn-nav.active { border-bottom: 2px solid #c9a961; }
        .badge { 
            background: #8b0000; 
            color: white; 
            font-size: 0.65rem; 
            padding: 0.1rem 0.3rem; 
            border-radius: 10px;
            position: absolute;
            top: -5px;
            right: -5px;
        }
        
        /* User Section */
        .user-section {
            border-top: 1px solid #2a2a3a;
            padding: 0.75rem 1rem;
            font-size: 0.85rem;
        }
        .user-links button {
            background: none;
            border: none;
            color: #c9a961;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
        }
        .user-links button:hover { text-decoration: underline; }
        .user-info { display: flex; align-items: center; gap: 1rem; }
        .user-name { color: #c9a961; font-family: 'Cinzel', serif; }
        
        /* Main Content */
        main { max-width: 1200px; margin: 0 auto; padding: 1.5rem 1rem; min-height: 60vh; }
        
        /* Categories Grid */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .category-card {
            background: linear-gradient(145deg, #11111a, #0d0d14);
            border: 1px solid #2a2a3a;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 4px;
        }
        .category-card:hover {
            border-color: #8b0000;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(139,0,0,0.3);
        }
        .category-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .category-name { font-family: 'Cinzel', serif; color: #e8e8f0; font-size: 1.1rem; }
        
        /* Cards */
        .card {
            background: linear-gradient(145deg, #11111a, #0d0d14);
            border: 1px solid #2a2a3a;
            margin-bottom: 1rem;
            border-radius: 4px;
        }
        .card-header {
            padding: 1rem;
            border-bottom: 1px solid #2a2a3a;
            background: rgba(17,17,26,0.8);
        }
        .card-body { padding: 1rem; }
        .card-footer {
            padding: 0.75rem 1rem;
            border-top: 1px solid #2a2a3a;
            background: rgba(17,17,26,0.5);
        }
        
        /* Buttons */
        .btn {
            padding: 0.6rem 1.2rem;
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-primary {
            background: linear-gradient(135deg, #8b0000, #6b0000);
            color: white;
            border: 1px solid #a50000;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #a50000, #8b0000);
            transform: translateY(-2px);
        }
        .btn-gold {
            background: linear-gradient(135deg, #c9a961, #b89650);
            color: #0a0a0f;
            border: 1px solid #d4b87a;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #3a3a4a;
            color: #c9a961;
        }
        
        /* Forms */
        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 0.75rem;
            background: #0f0f16;
            border: 1px solid #2a2a3a;
            border-bottom: 2px solid #3a3a4a;
            color: #e8e8f0;
            font-family: inherit;
            margin-bottom: 1rem;
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-bottom-color: #c9a961;
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(5,5,10,0.95);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: linear-gradient(145deg, #11111a, #0d0d14);
            border: 1px solid #2a2a3a;
            max-width: 450px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 4px;
        }
        .modal-header {
            padding: 1rem;
            border-bottom: 1px solid #2a2a3a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-close {
            background: none;
            border: none;
            color: #888;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .modal-close:hover { color: #c9a961; }
        .modal-body { padding: 1.5rem; }
        
        /* Post Items */
        .post-item {
            padding: 1rem;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: all 0.2s;
        }
        .post-item:hover {
            border-left-color: #8b0000;
            background: rgba(139,0,0,0.05);
        }
        .post-title { font-family: 'Cinzel', serif; margin-bottom: 0.5rem; }
        .post-meta { font-size: 0.85rem; color: #888; }
        
        /* Comments */
        .comment {
            border-left: 2px solid #3a3a4a;
            padding-left: 1rem;
            margin-bottom: 1rem;
        }
        .comment.nested { margin-left: 2rem; border-left-color: #8b0000; }
        .comment-author { color: #c9a961; font-family: 'Cinzel', serif; font-size: 0.9rem; }
        
        /* Utilities */
        .hidden { display: none !important; }
        .text-gold { color: #c9a961; }
        .text-muted { color: #888; }
        .text-center { text-align: center; }
        .mb-4 { margin-bottom: 1rem; }
        .mt-4 { margin-top: 1rem; }
        .flex { display: flex; }
        .gap-2 { gap: 0.5rem; }
        .justify-end { justify-content: flex-end; }
        
        /* Footer */
        footer {
            border-top: 1px solid #2a2a3a;
            padding: 1.5rem;
            text-align: center;
            font-size: 0.85rem;
            color: #888;
            margin-top: 2rem;
        }
        
        /* Loading */
        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid #2a2a3a;
            border-top-color: #c9a961;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Toast */
        .toast-container {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 9999;
        }
        .toast {
            background: #11111a;
            border: 1px solid #2a2a3a;
            border-left: 3px solid #c9a961;
            padding: 0.75rem 1rem;
            margin-bottom: 0.5rem;
            border-radius: 4px;
            animation: slideIn 0.3s ease;
        }
        .toast.error { border-left-color: #8b0000; }
        .toast.success { border-left-color: #2d7d4e; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @media (max-width: 640px) {
            .categories-grid { grid-template-columns: repeat(2, 1fr); }
            .header-content { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <div class="toast-container" id="toast-container"></div>
    
    <header>
        <div class="header-content">
            <div class="logo">
                <span class="logo-icon">🎩</span>
                <div>
                    <div class="logo-text font-gothic">NOC FORUM</div>
                    <div class="logo-sub">Ars Magica</div>
                </div>
            </div>
            <div class="nav-buttons">
                <button class="btn-nav active" id="btn-home" title="Home">⌂ Home</button>
                <button class="btn-nav hidden" id="btn-back" title="Kembali">← Back</button>
                <button class="btn-nav" id="btn-refresh" title="Refresh">⟳</button>
                <button class="btn-nav" id="btn-notif" title="Notifikasi" style="position:relative">
                    🔔 <span id="notif-badge" class="badge hidden">0</span>
                </button>
            </div>
        </div>
        <div class="user-section">
            <div class="user-links" id="auth-links">
                <button onclick="showAuthModal('login')">✦ Login</button>
                <span class="text-muted mx-2">•</span>
                <button onclick="showAuthModal('signup')">✦ Daftar</button>
            </div>
            <div class="user-info hidden" id="user-info">
                <span>👤 <span class="user-name font-gothic" id="user-name"></span></span>
                <button onclick="logout()" style="background:none;border:none;color:#888;cursor:pointer">[Keluar]</button>
            </div>
        </div>
    </header>

    <main id="main-content">
        <!-- Content will be rendered here -->
    </main>

    <footer>
        <div class="font-gothic text-gold mb-4">✦ NOC FORUM ✦</div>
        <p class="italic">dibuat untuk happy, kalo ga happy pergi by Prof.Z — nocfams 2025</p>
        <p class="mt-4">join whatsapp nocfams ? hubungi prof.Z , mudahan dia lagi mood :)</p>
    </footer>

    <!-- Auth Modal -->
    <div class="modal-overlay" id="auth-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="font-gothic text-gold" id="modal-title">✦ Login</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="auth-form">
                    <input type="text" id="auth-username" class="form-input" placeholder="Username" style="display:none">
                    <input type="email" id="auth-email" class="form-input" placeholder="Email" required>
                    <input type="password" id="auth-password" class="form-input" placeholder="Password" required>
                    <div id="signup-fields" style="display:none">
                        <select id="auth-lama" class="form-select">
                            <option value="">Lama main sulap...</option>
                            <option value="Kurang dari 1 tahun">Kurang dari 1 tahun</option>
                            <option value="1-3 tahun">1-3 tahun</option>
                            <option value="3-5 tahun">3-5 tahun</option>
                            <option value="5+ tahun">5+ tahun</option>
                        </select>
                        <select id="auth-aliran" class="form-select">
                            <option value="">Aliran sulap...</option>
                            <option value="Mentalism">Mentalism</option>
                            <option value="Sleight of Hand">Sleight of Hand</option>
                            <option value="Illusionism">Illusionism</option>
                            <option value="Close-up">Close-up Magic</option>
                            <option value="Stage">Stage Magic</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width:100%;margin-top:1rem">
                        <span id="btn-submit-text">Masuk</span>
                    </button>
                </form>
                <p class="text-center text-muted mt-4" style="font-size:0.85rem">
                    <span id="switch-text">Belum punya akun?</span>
                    <button onclick="toggleAuthMode()" class="text-gold" style="background:none;border:none;cursor:pointer;margin-left:0.25rem">
                        <span id="switch-btn">Daftar</span>
                    </button>
                </p>
            </div>
        </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDmLQP7Es2hwOC8ByeIOcr6vlFKUGGgsx0",
            authDomain: "magicnoc-125b6.firebaseapp.com",
            databaseURL: "https://magicnoc-125b6-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "magicnoc-125b6",
            storageBucket: "magicnoc-125b6.firebasestorage.app",
            messagingSenderId: "321388594743",
            appId: "1:321388594743:web:0dfc8f24d5201f138a21b2"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        
        // App State
        const CATEGORIES = [
            {id:'cardmagic', name:'✦ Card Magic', icon:'♠'},
            {id:'coinmagic', name:'✦ Coin Magic', icon:'◉'},
            {id:'mentalism', name:'✦ Mentalism', icon:'◈'},
            {id:'everydayobject', name:'✦ Everyday Object', icon:'◇'},
            {id:'idea', name:'✦ Idea', icon:'✧'},
            {id:'market', name:'✦ Market Magic', icon:'❖'}
        ];
        
        let currentUser = null;
        let currentView = 'home';
        let currentCategory = null;
        let currentPost = null;
        let posts = [];
        let comments = [];
        let users = [];
        let likes = [];
        
        // Toast Notification
        function toast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const div = document.createElement('div');
            div.className = 'toast ' + (type === 'error' ? 'error' : type === 'success' ? 'success' : '');
            div.textContent = message;
            container.appendChild(div);
            setTimeout(() => div.remove(), 3500);
        }
        
        // Auth Functions
        let authMode = 'login';
        
        function showAuthModal(mode) {
            authMode = mode;
            document.getElementById('auth-modal').classList.add('active');
            document.getElementById('modal-title').textContent = mode === 'login' ? '✦ Login' : '✦ Daftar Akun';
            document.getElementById('btn-submit-text').textContent = mode === 'login' ? 'Masuk' : 'Daftar';
            document.getElementById('signup-fields').style.display = mode === 'signup' ? 'block' : 'none';
            document.getElementById('auth-username').style.display = mode === 'signup' ? 'block' : 'none';
            document.getElementById('switch-text').textContent = mode === 'login' ? 'Belum punya akun?' : 'Sudah punya akun?';
            document.getElementById('switch-btn').textContent = mode === 'login' ? 'Daftar' : 'Login';
        }
        
        function closeModal() {
            document.getElementById('auth-modal').classList.remove('active');
        }
        
        function toggleAuthMode() {
            showAuthModal(authMode === 'login' ? 'signup' : 'login');
        }
        
        // Auth Form Submit
        document.getElementById('auth-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            
            try {
                if (authMode === 'login') {
                    await auth.signInWithEmailAndPassword(email, password);
                    toast('Login berhasil!', 'success');
                } else {
                    const username = document.getElementById('auth-username').value;
                    const lama = document.getElementById('auth-lama').value;
                    const aliran = document.getElementById('auth-aliran').value;
                    
                    const cred = await auth.createUserWithEmailAndPassword(email, password);
                    await db.collection('users').doc(cred.user.uid).set({
                        username: username,
                        email: email,
                        lama_sulap: lama,
                        aliran_sulap: aliran,
                        bio: '',
                        joinedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    toast('Registrasi berhasil! Silakan login.', 'success');
                    setTimeout(() => {
                        auth.signOut();
                        toggleAuthMode();
                    }, 1500);
                }
                closeModal();
            } catch (error) {
                toast(error.message, 'error');
            }
        });
        
        // Auth State Observer
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const doc = await db.collection('users').doc(user.uid).get();
                if (doc.exists) {
                    currentUser = { uid: user.uid, ...doc.data() };
                    document.getElementById('auth-links').classList.add('hidden');
                    document.getElementById('user-info').classList.remove('hidden');
                    document.getElementById('user-name').textContent = currentUser.username;
                }
            } else {
                currentUser = null;
                document.getElementById('auth-links').classList.remove('hidden');
                document.getElementById('user-info').classList.add('hidden');
            }
            render();
        });
        
        function logout() {
            auth.signOut();
            toast('Sampai jumpa!', 'info');
        }
        
        // Navigation
        function navigate(view, param = null) {
            currentView = view;
            currentCategory = param;
            
            if (view === 'home') {
                document.getElementById('btn-back').classList.add('hidden');
                document.getElementById('btn-home').classList.add('active');
            } else {
                document.getElementById('btn-back').classList.remove('hidden');
                document.getElementById('btn-home').classList.remove('active');
            }
            render();
            window.scrollTo(0, 0);
        }
        
        document.getElementById('btn-home').addEventListener('click', () => navigate('home'));
        document.getElementById('btn-back').addEventListener('click', () => {
            if (currentView === 'post') {
                navigate('category', currentCategory);
            } else if (currentView === 'category') {
                navigate('home');
            }
        });
        document.getElementById('btn-refresh').addEventListener('click', () => {
            toast('Memuat ulang...', 'info');
            loadData();
        });
        
        // Load Data
        async function loadData() {
            try {
                const postsSnap = await db.collection('posts').orderBy('timestamp', 'desc').limit(50).get();
                posts = postsSnap.docs.map(d => ({id: d.id, ...d.data()}));
                
                const usersSnap = await db.collection('users').get();
                users = usersSnap.docs.map(d => ({id: d.id, ...d.data()}));
                
                const commentsSnap = await db.collection('comments').get();
                comments = commentsSnap.docs.map(d => ({id: d.id, ...d.data()}));
                
                const likesSnap = await db.collection('likes').get();
                likes = likesSnap.docs.map(d => ({id: d.id, ...d.data()}));
                
                render();
            } catch (error) {
                console.error('Error loading data:', error);
                toast('Gagal memuat data', 'error');
            }
        }
        
        // Render Functions
        function render() {
            const main = document.getElementById('main-content');
            
            if (currentView === 'home') {
                renderHome(main);
            } else if (currentView === 'category') {
                renderCategory(main);
            } else if (currentView === 'post') {
                renderPost(main);
            }
        }
        
        function renderHome(container) {
            let html = '<div class="text-center" style="padding:2rem 0">';
            html += '<h2 class="font-gothic text-gold" style="font-size:1.5rem;margin-bottom:0.5rem">✦ Selamat Datang ✦</h2>';
            html += '<p class="text-muted italic" style="margin-bottom:1.5rem">Pilih kategori untuk menjelajahi dunia sulap</p>';
            html += '<div class="categories-grid">';
            
            CATEGORIES.forEach(cat => {
                html += '<div class="category-card" onclick="navigate(\'category\', \'' + cat.id + '\')">';
                html += '<div class="category-icon">' + cat.icon + '</div>';
                html += '<div class="category-name">' + cat.name + '</div>';
                html += '</div>';
            });
            
            html += '</div></div>';
            container.innerHTML = html;
        }
        
        function renderCategory(container) {
            const cat = CATEGORIES.find(c => c.id === currentCategory);
            const catPosts = posts.filter(p => p.category === currentCategory);
            
            let html = '<div style="margin-bottom:1rem">';
            html += '<h2 class="font-gothic text-gold" style="font-size:1.25rem">' + (cat ? cat.icon + ' ' + cat.name : 'Kategori') + '</h2>';
            if (currentUser) {
                html += '<button onclick="showNewPostForm()" class="btn btn-primary" style="margin-top:0.5rem;font-size:0.75rem;padding:0.4rem 0.8rem">＋ Thread Baru</button>';
            }
            html += '</div>';
            
            if (catPosts.length === 0) {
                html += '<div class="card" style="padding:2rem;text-align:center">';
                html += '<p class="text-muted italic">Belum ada thread. Jadilah yang pertama! ✨</p>';
                html += '</div>';
            } else {
                catPosts.forEach(post => {
                    const author = users.find(u => u.id === post.userid) || {};
                    const postComments = comments.filter(c => c.postid === post.id).length;
                    const postLikes = likes.filter(l => l.postid === post.id).length;
                    const date = post.timestamp ? new Date(post.timestamp.toDate()).toLocaleDateString('id-ID') : '-';
                    
                    html += '<div class="card post-item" onclick="openPost(\'' + post.id + '\')">';
                    html += '<div class="post-title" style="color:#e8e8f0">' + (post.title || 'Untitled') + '</div>';
                    html += '<div class="post-meta">oleh <span class="text-gold">' + (author.username || 'Anon') + '</span> • ' + date + ' • ' + postComments + '💬 • ' + postLikes + '❤</div>';
                    html += '</div>';
                });
            }
            
            container.innerHTML = html;
        }
        
        function renderPost(container) {
            const post = posts.find(p => p.id === currentPost);
            if (!post) {
                container.innerHTML = '<p class="text-center text-muted">Thread tidak ditemukan</p>';
                return;
            }
            
            const author = users.find(u => u.id === post.userid) || {};
            const postComments = comments.filter(c => c.postid === post.id).sort((a,b) => (a.timestamp?.toDate() || 0) - (b.timestamp?.toDate() || 0));
            const postLikes = likes.filter(l => l.postid === post.id);
            const liked = currentUser && postLikes.some(l => l.userid === currentUser.uid);
            const date = post.timestamp ? new Date(post.timestamp.toDate()).toLocaleString('id-ID') : '-';
            
            let html = '<div>';
            
            // Post Content
            html += '<div class="card">';
            html += '<div class="card-header">';
            html += '<h2 class="font-gothic" style="font-size:1.1rem">' + post.title + '</h2>';
            html += '<div class="text-muted" style="font-size:0.85rem;margin-top:0.25rem">oleh <span class="text-gold">' + (author.username || 'Anon') + '</span> • ' + date + '</div>';
            html += '</div>';
            html += '<div class="card-body" style="white-space:pre-wrap">' + (post.content || '') + '</div>';
            html += '<div class="card-footer" style="display:flex;justify-content:space-between;align-items:center">';
            html += '<div style="display:flex;gap:1rem">';
            html += '<button onclick="toggleLike(\'' + post.id + '\')" style="background:none;border:none;cursor:pointer;color:' + (liked ? '#8b0000' : '#888') + '">' + (liked ? '❤' : '♡') + ' ' + postLikes.length + '</button>';
            html += '<span class="text-muted">👁 ' + (post.views || 0) + '</span>';
            html += '</div>';
            if (currentUser && currentUser.uid === post.userid) {
                html += '<button onclick="deletePost(\'' + post.id + '\')" style="background:none;border:none;cursor:pointer;color:#888;font-size:0.8rem">[Hapus]</button>';
            }
            html += '</div></div>';
            
            // Comments
            html += '<div class="card" style="margin-top:1rem">';
            html += '<div class="card-header"><span class="font-gothic">💬 Komentar (' + postComments.length + ')</span></div>';
            html += '<div class="card-body">';
            
            if (currentUser) {
                html += '<form id="comment-form" style="margin-bottom:1.5rem">';
                html += '<textarea id="comment-text" class="form-textarea" placeholder="Tulis komentar..." rows="2" required></textarea>';
                html += '<div style="text-align:right"><button type="submit" class="btn btn-primary" style="font-size:0.75rem;padding:0.4rem 0.8rem">Kirim</button></div>';
                html += '</form>';
            } else {
                html += '<p class="text-center text-muted" style="padding:1rem">Login untuk berkomentar</p>';
            }
            
            postComments.forEach(cmt => {
                const cmtAuthor = users.find(u => u.id === cmt.userid) || {};
                const cmtDate = cmt.timestamp ? new Date(cmt.timestamp.toDate()).toLocaleString('id-ID', {hour:'2-digit',minute:'2-digit'}) : '';
                
                html += '<div class="comment' + (cmt.parent_comment_id ? ' nested' : '') + '">';
                html += '<div class="comment-author">' + (cmtAuthor.username || 'Anon') + '</div>';
                html += '<p style="font-size:0.9rem;margin:0.25rem 0">' + cmt.content + '</p>';
                html += '<div style="font-size:0.75rem;color:#888">' + cmtDate + '</div>';
                html += '</div>';
            });
            
            html += '</div></div></div>';
            container.innerHTML = html;
            
            // Comment form submit
            document.getElementById('comment-form')?.addEventListener('submit', async function(e) {
                e.preventDefault();
                const text = document.getElementById('comment-text').value;
                if (!text.trim()) return;
                
                try {
                    await db.collection('comments').add({
                        postid: post.id,
                        userid: currentUser.uid,
                        username: currentUser.username,
                        content: text,
                        parent_comment_id: 'root',
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    document.getElementById('comment-text').value = '';
                    loadData();
                    toast('Komentar terkirim', 'success');
                } catch (error) {
                    toast('Gagal mengirim komentar', 'error');
                }
            });
        }
        
        function openPost(postId) {
            currentPost = postId;
            navigate('post');
        }
        
        function showNewPostForm() {
            const title = prompt('Judul thread:');
            if (!title) return;
            const content = prompt('Isi thread:');
            if (!content) return;
            
            createPost(title, content);
        }
        
        async function createPost(title, content) {
            try {
                await db.collection('posts').add({
                    userid: currentUser.uid,
                    username: currentUser.username,
                    title: title,
                    content: content,
                    category: currentCategory,
                    views: 0,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                toast('Thread diterbitkan ✦', 'success');
                loadData();
            } catch (error) {
                toast('Gagal membuat thread', 'error');
            }
        }
        
        async function toggleLike(postId) {
            if (!currentUser) {
                toast('Login untuk menyukai', 'error');
                return;
            }
            
            const existing = likes.find(l => l.postid === postId && l.userid === currentUser.uid);
            try {
                if (existing) {
                    await db.collection('likes').doc(existing.id).delete();
                } else {
                    await db.collection('likes').add({
                        postid: postId,
                        userid: currentUser.uid,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                loadData();
            } catch (error) {
                toast('Gagal', 'error');
            }
        }
        
        async function deletePost(postId) {
            if (!confirm('Hapus thread ini?')) return;
            try {
                await db.collection('posts').doc(postId).delete();
                toast('Thread dihapus', 'success');
                navigate('category', currentCategory);
            } catch (error) {
                toast('Gagal menghapus', 'error');
            }
        }
        
        // Initial Load
        loadData();
    </script>
</body>
</html>
