<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOC FORUM • Professional Magic Community</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <style>
    :root {
      --bg-primary: #0b0f19;
      --bg-secondary: #111827;
      --bg-card: #1a202c;
      --border: #2d3748;
      --text-primary: #f7fafc;
      --text-secondary: #a0aec0;
      --text-muted: #718096;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
    }

    h1, h2, h3 { font-family: 'Playfair Display', serif; }
    
    .container { max-width: 1100px; margin: 0 auto; padding: 0 1.25rem; }
    .flex { display: flex; align-items: center; }
    .flex-between { justify-content: space-between; }
    .gap-2 { gap: 0.5rem; } .gap-3 { gap: 0.75rem; }
    .py-6 { padding: 1.5rem 0; }
    
    .navbar {
      position: sticky; top: 0; z-index: 50;
      background: rgba(11, 15, 25, 0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 0;
    }
    
    .nav-brand { display: flex; align-items: center; gap: 0.75rem; }
    .nav-logo { 
      width: 36px; height: 36px; 
      background: linear-gradient(135deg, var(--accent), #8b5cf6); 
      border-radius: 8px; 
      display: grid; place-items: center; 
      font-weight: 700; color: white; 
    }
    
    .nav-links { display: flex; gap: 1.5rem; }
    .nav-link { 
      color: var(--text-secondary); 
      font-size: 0.9rem; 
      font-weight: 500; 
      cursor: pointer;
      transition: all 0.2s;
    }
    .nav-link:hover, .nav-link.active { color: var(--text-primary); }
    
    .btn {
      padding: 0.6rem 1.2rem; 
      border-radius: 8px; 
      font-weight: 500; 
      cursor: pointer; 
      border: none; 
      transition: all 0.2s;
      display: inline-flex; 
      align-items: center; 
      gap: 0.5rem;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); }
    .btn-ghost { background: transparent; color: var(--text-muted); padding: 0.5rem; }
    .btn-ghost:hover { color: var(--text-primary); background: var(--bg-card); }
    
    .card {
      background: var(--bg-card); 
      border: 1px solid var(--border); 
      border-radius: 12px;
      padding: 1.25rem;
    }
    
    .avatar {
      width: 40px; height: 40px; 
      border-radius: 50%; 
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      display: grid; place-items: center; 
      font-weight: 600; color: white;
    }
    
    .badge {
      display: inline-flex; 
      padding: 0.25rem 0.6rem; 
      border-radius: 999px;
      font-size: 0.75rem; 
      font-weight: 500; 
      background: rgba(59,130,246,0.15); 
      color: var(--accent);
    }
    
    .form-input, .form-textarea, .form-select {
      width: 100%; 
      background: var(--bg-secondary); 
      border: 1px solid var(--border);
      color: var(--text-primary); 
      padding: 0.75rem 1rem; 
      border-radius: 8px;
      margin-bottom: 1rem;
    }
    .form-input:focus, .form-textarea:focus {
      outline: none; 
      border-color: var(--accent);
    }
    
    .modal-overlay {
      position: fixed; inset: 0; 
      background: rgba(0,0,0,0.8); 
      backdrop-filter: blur(4px);
      z-index: 100; 
      display: none; 
      place-items: center; 
      padding: 1rem;
    }
    .modal-overlay.active { display: grid; }
    .modal {
      background: var(--bg-card); 
      border: 1px solid var(--border); 
      border-radius: 12px;
      width: 100%; max-width: 500px; 
      padding: 1.5rem;
    }
    
    #toast-container { position: fixed; top: 1rem; right: 1rem; z-index: 200; }
    .toast { 
      padding: 0.75rem 1rem; 
      border-radius: 8px; 
      background: var(--bg-card); 
      border-left: 4px solid var(--accent); 
      margin-bottom: 0.5rem;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    
    .hidden { display: none !important; }
    .text-accent { color: var(--accent); }
    .text-muted { color: var(--text-muted); }
    .mb-4 { margin-bottom: 1rem; }
    .mt-4 { margin-top: 1rem; }
    
    .thread-item { cursor: pointer; border-left: 3px solid transparent; padding: 1rem; }
    .thread-item:hover { border-left-color: var(--accent); background: rgba(59,130,246,0.05); }
    
    .empty-state { text-align: center; padding: 3rem; color: var(--text-muted); }
    .empty-state i { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }
    
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .hide-mobile { display: none; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="container flex flex-between">
      <div class="nav-brand">
        <div class="nav-logo">🎩</div>
        <div>
          <div style="font-family:'Playfair Display'; font-weight:700;">NOC FORUM</div>
          <div style="font-size:0.75rem; color:var(--text-muted);">Ars Magica Community</div>
        </div>
      </div>
      
      <div class="nav-links">
        <span class="nav-link active" onclick="App.router.go('home')">Beranda</span>
        <span class="nav-link" onclick="App.router.go('trending')">Trending</span>
        <span class="nav-link" onclick="App.router.go('search')">Cari</span>
      </div>

      <div class="flex gap-3">
        <div id="auth-buttons">
          <button class="btn btn-outline" onclick="App.ui.openModal('login')">Login</button>
          <button class="btn btn-primary" onclick="App.ui.openModal('register')">Daftar</button>
        </div>
        
        <div id="user-menu" class="hidden flex gap-3">
          <button class="btn btn-ghost"><i class="fa-solid fa-bell"></i></button>
          <div class="flex items-center gap-2" style="cursor:pointer;" onclick="App.router.go('profile')">
            <div id="user-avatar" class="avatar" style="width:32px;height:32px;font-size:0.8rem;"></div>
            <span id="user-name" class="hide-mobile"></span>
          </div>
          <button class="btn btn-ghost text-red-400" onclick="App.auth.logout()"><i class="fa-solid fa-right-from-bracket"></i></button>
        </div>
      </div>
    </div>
  </nav>

  <main id="app-content" class="container py-6" style="min-height:60vh;">
    <!-- Content will be rendered here -->
  </main>

  <footer style="border-top:1px solid var(--border); padding:2rem 0; text-align:center; color:var(--text-muted); font-size:0.85rem;">
    <div class="container">
      <div style="color:var(--accent); font-weight:600; margin-bottom:0.5rem;">✦ NOC FORUM ✦</div>
      <p>dibuat untuk happy, kalo ga happy pergi by Prof.Z — nocfams 2025</p>
    </div>
  </footer>

  <!-- Auth Modal -->
  <div id="auth-modal" class="modal-overlay">
    <div class="modal">
      <div class="flex flex-between mb-4">
        <h2 id="auth-title" style="font-size:1.5rem;">Login</h2>
        <button class="btn btn-ghost" onclick="App.ui.closeModal('auth')"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <form id="auth-form">
        <div id="username-field" class="hidden">
          <label class="block text-sm text-gray-400 mb-1">Username</label>
          <input type="text" id="auth-username" class="form-input" required>
        </div>
        <label class="block text-sm text-gray-400 mb-1">Email</label>
        <input type="email" id="auth-email" class="form-input" required>
        
        <label class="block text-sm text-gray-400 mb-1">Password</label>
        <input type="password" id="auth-password" class="form-input" required>
        
        <div id="profile-fields" class="hidden">
          <label class="block text-sm text-gray-400 mb-1">Lama Main Sulap</label>
          <select id="auth-lama" class="form-select">
            <option value="< 1 Tahun">&lt; 1 Tahun</option>
            <option value="1-3 Tahun">1-3 Tahun</option>
            <option value="3-5 Tahun">3-5 Tahun</option>
            <option value="5+ Tahun">5+ Tahun</option>
          </select>
          
          <label class="block text-sm text-gray-400 mb-1">Aliran Sulap</label>
          <select id="auth-aliran" class="form-select">
            <option value="Mentalism">Mentalism</option>
            <option value="Sleight of Hand">Sleight of Hand</option>
            <option value="Close-up">Close-up Magic</option>
          </select>
        </div>
        
        <button type="submit" class="btn btn-primary w-full mt-4" style="justify-content:center;">Masuk</button>
      </form>
      <p class="mt-4 text-center text-sm text-muted">
        <span id="auth-switch-text">Belum punya akun?</span>
        <span class="text-accent" style="cursor:pointer;margin-left:0.25rem;" onclick="App.ui.toggleAuthMode()">Daftar</span>
      </p>
    </div>
  </div>

  <div id="toast-container"></div>

  <script>
    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyDmLQP7Es2hwOC8ByeIOcr6vlFKUGGgsx0",
      authDomain: "magicnoc-125b6.firebaseapp.com",
      projectId: "magicnoc-125b6",
      storageBucket: "magicnoc-125b6.firebasestorage.app",
      messagingSenderId: "321388594743",
      appId: "1:321388594743:web:0dfc8f24d5201f138a21b2"
    };

    // Initialize Firebase
    try {
      if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
      }
    } catch (e) {
      console.error('Firebase init error:', e);
    }

    const auth = firebase.auth();
    const db = firebase.firestore();

    // App State
    const App = {
      state: {
        user: null,
        threads: [],
        users: new Map(),
        currentView: 'home'
      },

      init() {
        console.log('App initializing...');
        this.auth.init();
        this.router.init();
        this.ui.setupEventListeners();
        console.log('App initialized');
      },

      auth: {
        user: null,
        
        init() {
          auth.onAuthStateChanged(async (user) => {
            console.log('Auth state changed:', user?.email);
            if (user) {
              try {
                const doc = await db.collection('users').doc(user.uid).get();
                if (doc.exists) {
                  App.state.user = { uid: user.uid, ...doc.data() };
                  App.auth.user = App.state.user;
                  App.ui.updateAuthUI();
                  App.data.loadThreads();
                }
              } catch (e) {
                console.error('Error loading user:', e);
              }
            } else {
              App.state.user = null;
              App.auth.user = null;
              App.ui.updateAuthUI();
              App.data.loadThreads();
            }
          });
        },

        async login(email, password) {
          try {
            await auth.signInWithEmailAndPassword(email, password);
            App.ui.toast('Login berhasil!', 'success');
            App.ui.closeModal('auth');
          } catch (e) {
            App.ui.toast('Login gagal: ' + e.message, 'error');
          }
        },

        async register(email, password, username, lama, aliran) {
          try {
            const cred = await auth.createUserWithEmailAndPassword(email, password);
            await db.collection('users').doc(cred.user.uid).set({
              username, email, lama_sulap: lama, aliran_sulap: aliran,
              createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            App.ui.toast('Akun dibuat! Silakan login.', 'success');
            setTimeout(() => {
              auth.signOut();
              App.ui.toggleAuthMode();
            }, 1500);
          } catch (e) {
            App.ui.toast('Registrasi gagal: ' + e.message, 'error');
          }
        },

        async logout() {
          await auth.signOut();
          App.ui.toast('Logout berhasil', 'info');
        }
      },

      data: {
        async loadThreads() {
          try {
            const snapshot = await db.collection('threads').orderBy('createdAt', 'desc').limit(20).get();
            App.state.threads = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            App.router.render();
          } catch (e) {
            console.error('Error loading threads:', e);
            App.ui.toast('Gagal memuat thread', 'error');
          }
        },

        async createThread(title, content, category) {
          if (!App.auth.user) {
            App.ui.toast('Login untuk membuat thread', 'error');
            return;
          }
          try {
            await db.collection('threads').add({
              title, content, category,
              authorId: App.auth.user.uid,
              authorName: App.auth.user.username,
              createdAt: firebase.firestore.FieldValue.serverTimestamp(),
              likeCount: 0,
              commentCount: 0
            });
            App.ui.toast('Thread dipublikasi!', 'success');
            App.ui.closeModal('thread');
            App.data.loadThreads();
          } catch (e) {
            App.ui.toast('Gagal membuat thread: ' + e.message, 'error');
          }
        }
      },

      ui: {
        toast(msg, type = 'info') {
          const container = document.getElementById('toast-container');
          const div = document.createElement('div');
          div.className = 'toast';
          div.style.borderLeftColor = type === 'error' ? '#ef4444' : type === 'success' ? '#10b981' : 'var(--accent)';
          div.textContent = msg;
          container.appendChild(div);
          setTimeout(() => div.remove(), 3500);
        },

        openModal(type) {
          document.getElementById('auth-modal').classList.add('active');
          if (type === 'register') {
            document.getElementById('auth-title').textContent = 'Daftar Akun';
            document.getElementById('username-field').classList.remove('hidden');
            document.getElementById('profile-fields').classList.remove('hidden');
          }
        },

        closeModal(type) {
          document.getElementById('auth-modal').classList.remove('active');
        },

        toggleAuthMode() {
          const isLogin = document.getElementById('auth-title').textContent === 'Login';
          document.getElementById('auth-title').textContent = isLogin ? 'Daftar Akun' : 'Login';
          document.getElementById('username-field').classList.toggle('hidden', isLogin);
          document.getElementById('profile-fields').classList.toggle('hidden', isLogin);
          document.getElementById('auth-switch-text').textContent = isLogin ? 'Sudah punya akun?' : 'Belum punya akun?';
        },

        updateAuthUI() {
          const user = App.state.user;
          document.getElementById('auth-buttons').classList.toggle('hidden', !!user);
          document.getElementById('user-menu').classList.toggle('hidden', !user);
          if (user) {
            document.getElementById('user-name').textContent = user.username;
            document.getElementById('user-avatar').textContent = user.username.charAt(0).toUpperCase();
          }
        },

        setupEventListeners() {
          document.getElementById('auth-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const mode = document.getElementById('auth-title').textContent;
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-password').value;
            
            if (mode === 'Login') {
              App.auth.login(email, pass);
            } else {
              const username = document.getElementById('auth-username').value;
              const lama = document.getElementById('auth-lama').value;
              const aliran = document.getElementById('auth-aliran').value;
              App.auth.register(email, pass, username, lama, aliran);
            }
          });
        }
      },

      router: {
        init() {
          window.addEventListener('hashchange', () => this.render());
          this.render();
        },

        go(route) {
          location.hash = route;
        },

        render() {
          const hash = location.hash.slice(1) || 'home';
          App.state.currentView = hash;
          const main = document.getElementById('app-content');
          
          // Update nav active state
          document.querySelectorAll('.nav-link').forEach(el => {
            el.classList.toggle('active', el.textContent.toLowerCase().includes(hash));
          });

          try {
            switch(hash) {
              case 'home':
                main.innerHTML = this.renderHome();
                break;
              case 'trending':
                main.innerHTML = '<div class="card"><h2>Trending</h2><p>Fitur coming soon</p></div>';
                break;
              case 'search':
                main.innerHTML = '<div class="card"><h2>Cari</h2><p>Fitur coming soon</p></div>';
                break;
              default:
                main.innerHTML = this.renderHome();
            }
          } catch (e) {
            console.error('Render error:', e);
            main.innerHTML = '<div class="empty-state"><i class="fa-solid fa-circle-exclamation"></i><h3>Error</h3><p>' + e.message + '</p></div>';
          }
        },

        renderHome() {
          const user = App.state.user;
          const threads = App.state.threads;
          
          if (!threads.length) {
            return `
              <div class="empty-state card">
                <i class="fa-solid fa-wand-magic-sparkles"></i>
                <h3>Belum ada thread</h3>
                <p>Jadilah yang pertama memulai diskusi!</p>
                ${user ? `<button class="btn btn-primary mt-4" onclick="alert('Fitur create thread')">+ Buat Thread</button>` : ''}
              </div>
            `;
          }
          
          return `
            <div class="flex flex-between mb-4">
              <h2 style="font-size:1.5rem;">Diskusi Terbaru</h2>
              ${user ? `<button class="btn btn-primary" onclick="alert('Fitur create thread')"><i class="fa-solid fa-plus"></i> <span class="hide-mobile">Thread</span></button>` : ''}
            </div>
            <div class="space-y-3">
              ${threads.map(t => `
                <div class="card thread-item" onclick="alert('Detail thread: ${t.title}')">
                  <div class="mb-2"><span class="badge">${t.category || 'Umum'}</span></div>
                  <h3 style="font-size:1.1rem;margin-bottom:0.5rem;">${t.title}</h3>
                  <div class="text-muted text-sm">
                    <span>oleh ${t.authorName || 'Anon'}</span>
                    <span class="mx-2">•</span>
                    <span>${t.createdAt ? new Date(t.createdAt.toDate ? t.createdAt.toDate() : t.createdAt).toLocaleDateString('id-ID') : '-'}</span>
                  </div>
                </div>
              `).join('')}
            </div>
          `;
        }
      }
    };

    // Start App
    document.addEventListener('DOMContentLoaded', () => {
      console.log('DOM loaded, starting app...');
      App.init();
    });
  </script>
</body>
</html>
